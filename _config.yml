# Site Settings
locale                   : "ko-KR"
title                    : "EENTOST - Cybersecurity & Technology Blog"
subtitle                 : "Educational content on cybersecurity, malware analysis, ransomware defense, cloud security, and digital threats."
name                     : "EENTOST"
description              : "Educational content on cybersecurity, malware analysis, ransomware defense, cloud security, and digital threats."
url                      : "https://eentost.github.io"
teaser                   :
logo                     :
masthead_title           :
breadcrumbs              : false
words_per_minute         : 200

# Author
author :
  name                   : "EENTOST"
  avatar                 :
  bio                    : "Cybersecurity & Technology researcher specializing in malware analysis, ransomware defense, cloud security, and digital threat detection. Sharing educational content to help professionals stay secure."
  location               : "Seoul, South Korea"
  email                  :
  uri                    : https://eentost.github.io
  github                 : eentost
  twitter                : eentost

# Analytics
analytics :
  provider               : google-gtag
  google :
    tracking_id          : "G-XXXXXXXXXX"
google_site_verification :
bing_site_verification   :

# SEO
seo :
  type                   : Person
  name                   : EENTOST
  twitter :
    username             : eentost
  og_locale              : ko_KR

# Reading Files
include :
  - .htaccess
  - _pages
  - files
exclude :
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files :
  - .git
  - .svn
encoding                 : "utf-8"
markdown_ext             : "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown                 : kramdown
highlighter              : rouge
lsi                      : false
excerpt_separator        : "\n\n"
incremental              : false

# kramdown
kramdown :
  input                  : GFM
  hard_wrap              : false
  auto_ids               : true
  footnote_nr            : 1
  entity_output          : as_char
  toc_levels             : 1..6
  smart_quotes           : lsquo,rsquo,ldquo,rdquo
  enable_coderay         : false
